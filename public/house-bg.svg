<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="280" viewBox="0 0 1440 280" fill="none" role="img" aria-label="Subtle row of modern houses background">
  <defs>
    <!-- Soft fade so illustration blends into page background -->
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="white" stop-opacity="0"/>
      <stop offset="0.55" stop-color="white" stop-opacity="0.35"/>
      <stop offset="1" stop-color="white" stop-opacity="1"/>
    </linearGradient>

    <mask id="fadeMask">
      <rect x="0" y="0" width="1440" height="280" fill="url(#fade)"/>
    </mask>
  </defs>

  <g mask="url(#fadeMask)" opacity="0.18">
    <!-- Ground hint -->
    <rect x="0" y="220" width="1440" height="60" fill="#3B82F6" opacity="0.10"/>

    <!-- Houses row (simple rectangles + roof triangles) -->
    <!-- Left cluster -->
    <g>
      <rect x="40" y="160" width="120" height="80" rx="10" fill="#3B82F6"/>
      <path d="M40 165 L100 120 L160 165 Z" fill="#2563EB"/>

      <rect x="190" y="145" width="150" height="95" rx="12" fill="#3B82F6" opacity="0.9"/>
      <path d="M190 150 L265 105 L340 150 Z" fill="#2563EB" opacity="0.95"/>

      <rect x="370" y="170" width="110" height="70" rx="10" fill="#3B82F6" opacity="0.85"/>
      <path d="M370 175 L425 135 L480 175 Z" fill="#2563EB" opacity="0.9"/>
    </g>

    <!-- Mid-left -->
    <g>
      <rect x="520" y="150" width="140" height="90" rx="12" fill="#3B82F6" opacity="0.9"/>
      <path d="M520 155 L590 110 L660 155 Z" fill="#2563EB" opacity="0.95"/>

      <rect x="690" y="168" width="115" height="72" rx="10" fill="#3B82F6" opacity="0.82"/>
      <path d="M690 173 L747.5 135 L805 173 Z" fill="#2563EB" opacity="0.88"/>
    </g>

    <!-- Center -->
    <g>
      <rect x="840" y="138" width="170" height="102" rx="14" fill="#3B82F6"/>
      <path d="M840 144 L925 90 L1010 144 Z" fill="#2563EB"/>

      <rect x="1040" y="162" width="130" height="78" rx="12" fill="#3B82F6" opacity="0.86"/>
      <path d="M1040 167 L1105 125 L1170 167 Z" fill="#2563EB" opacity="0.92"/>
    </g>

    <!-- Right cluster -->
    <g>
      <rect x="1205" y="150" width="150" height="90" rx="12" fill="#3B82F6" opacity="0.9"/>
      <path d="M1205 155 L1280 108 L1355 155 Z" fill="#2563EB" opacity="0.95"/>

      <rect x="1375" y="170" width="90" height="70" rx="10" fill="#3B82F6" opacity="0.78"/>
      <path d="M1375 175 L1420 142 L1465 175 Z" fill="#2563EB" opacity="0.85"/>
    </g>
  </g>
</svg>

